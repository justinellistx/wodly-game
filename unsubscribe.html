<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WODLY — Unsubscribe</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--orange:#F5A623;--green:#4CAF50;--red:#E8363D;--bg:#0a0a0b;--surface:#161616;--border:#333;--text2:#aaa;--text3:#777;}
  body{font-family:system-ui,sans-serif;background:radial-gradient(circle at 50% -8%,#1d1d22,#0a0a0b 60%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .box{max-width:420px;width:100%;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 22px;}
  h1{font-size:30px;font-weight:900;letter-spacing:6px;}
  .sub{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:6px 0 18px;}
  p{font-size:14px;color:var(--text2);line-height:1.6;}
  .msg{font-size:16px;margin-top:6px;}.msg.ok{color:var(--green);}.msg.err{color:var(--red);}
  a{color:var(--orange);text-decoration:none;font-size:13px;display:inline-block;margin-top:18px;}
</style>
</head>
<body>
<div class="box">
  <h1>WODLY</h1><div class="sub">Email preferences</div>
  <div class="msg" id="msg">Unsubscribing…</div>
  <p id="detail" style="margin-top:10px;"></p>
  <a href="/">← Back to WODLY</a>
</div>
<script>
const SUPA_URL='https://ynznwosssctxbdiauekj.supabase.co',SUPA_KEY='sb_publishable_SjuVDLR6qX9JGjaQ3uK3fQ_hmy_t6Nq';
const token=new URLSearchParams(location.search).get('token');
const msg=document.getElementById('msg'),detail=document.getElementById('detail');
(async()=>{
  if(!token){msg.textContent='Invalid link';msg.className='msg err';detail.textContent='This unsubscribe link is missing its token.';return;}
  try{const r=await fetch(SUPA_URL+'/functions/v1/unsubscribe',{method:'POST',headers:{apikey:SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({token})});
    const j=await r.json();
    if(j.ok){msg.textContent='You’re unsubscribed ✓';msg.className='msg ok';detail.textContent=(j.email||'')+' will no longer receive WODLY emails. Sorry to see you go!';}
    else{msg.textContent='Couldn’t unsubscribe';msg.className='msg err';detail.textContent='This link may be invalid or already used. Contact us if it persists.';}
  }catch(e){msg.textContent='Network error';msg.className='msg err';detail.textContent='Please try again later.';}
})();
</script>
</body>
</html>
